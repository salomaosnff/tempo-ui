packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  esbuild: true
  vue-demi: true
catalog:
  "@regle/core": ^1.21.8
  "@regle/rules": ^1.21.8
  "@types/lodash-es": ^4.17.12
  "@types/node": ^25.6.0
  "@vitejs/plugin-vue": ^6.0.5
  "@vue/tsconfig": ^0.9.1
  "@vueuse/core": ^14.2.1
  lodash-es: ^4.18.1
  tsx: ^4.21.0
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.18
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: ^3.5.32
  vue-tsc: ^3.2.6
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
